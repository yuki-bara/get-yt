name: CI-MACOS

on: 
  push:
    paths:
      - src/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  BUILD:
    runs-on: macos-latest
    steps:
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - uses: actions/checkout@v6
      - name: Test compile
        run: make