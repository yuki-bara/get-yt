name: USER-UBUNTU

on: 
  push:
    paths:
      - src/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  USER:
    runs-on: ubuntu-latest
    steps:
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: go.work
      - uses: actions/checkout@v6
      - name: Test install
        run: sudo curl -fsSL https://github.com/yuki-bara/get-yt/raw/refs/heads/main/installation/auto_install.bash | bash
      - name: Test download
        run: get-yt -mp4 https://www.youtube.com/watch?v=dQw4w9WgXcQ